<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>treqe — Catálogo</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ===== treqe DESIGN SYSTEM ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      font-size: 17px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
      overflow-y: scroll;
    }
    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9F7F2;
      color: #1C1915;
      min-height: 100dvh;
      padding-bottom: 90px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    
  overscroll-behavior: none;}
    body.dark {
      background: #130B00;
      color: #E8E2D6;
    }
    img { max-width: 100%; display: block; }
    button { cursor: pointer; border: none; background: none; font-family: 'IBM Plex Mono', monospace; }
    a { text-decoration: none; color: inherit; }
    input, select { font-family: 'IBM Plex Sans', sans-serif; font-size: inherit; }

    :root {
      --bg: #F9F7F2;
      --surface: #FFF;
      --text: #1C1915;
      --text-sub: #55504B;
      --text-dim: #8A8580;
      --border: #E5E0D8;
      --border-strong: #C5C0B8;
      --accent: #1C1915;
    }
    body.dark {
      --bg: #130B00;
      --text: #E8E2D6;
      --border: #3A3630;
    }

    /* ===== HEADER ===== */
    .header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 12px;
      background: var(--bg);
      width: 100%;
    }
    .header .treqe-logo { height: 36px; width: auto; } body.dark .treqe-logo { filter: brightness(0) invert(0.85); } .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
      text-transform: uppercase;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-icon {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      border-radius: 2px;
      cursor: pointer;
      color: var(--text-sub);
      background: var(--surface);
      transition: background 0.2s;
    }
    .search-icon:hover { background: var(--border); }
    .search-icon i { font-size: 0.85rem; }
    .search-expand {
      position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
      display: flex; align-items: center;
      border: 1px solid var(--border-strong);
      border-radius: 2px;
      background: var(--surface);
      width: 0; overflow: hidden;
      opacity: 0;
      transition: width 0.25s ease, opacity 0.2s ease;
      z-index: 10;
      padding: 0;
      height: 38px;
    }
    .search-expand.open {
      width: 220px;
      opacity: 1;
      padding: 0 8px 0 14px;
    }
    .search-expand input {
      border: none; outline: none; background: transparent;
      font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem;
      color: var(--text); width: 100%;
    }
    .search-expand input::placeholder { color: var(--text-dim); }
    .search-close {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub);
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
    }
    .blog-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-sub);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 2px;
      transition: background 0.2s;
    }
    .blog-link:hover { background: var(--border); }
    .blog-link i { font-size: 0.65rem; margin-right: 6px; }

    /* ===== TOOLBAR ===== */
    .toolbar {
      display: flex; gap: 8px;
      padding: 8px 24px 4px;
      align-items: center;
    }
    .tool-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s;
    }
    .tool-btn:hover { background: var(--border); }
    .tool-btn:active { opacity: 0.8; }
    .tool-btn i { font-size: 0.7rem; color: var(--text-sub); }

    .sort-wrapper { position: relative; }
    .sort-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 4px;
      min-width: 200px;
      display: none; flex-direction: column; gap: 2px;
      z-index: 60;
    }
    .sort-dropdown.open { display: flex; }
    .sort-option {
      display: block; width: 100%; text-align: left;
      padding: 10px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text);
      cursor: pointer;
      background: transparent;
      transition: background 0.15s;
    }
    .sort-option:hover { background: var(--border); }
    .sort-option.active { background: var(--accent); color: var(--surface); }

    @media (min-width: 600px) {
      .header { padding: 24px 32px 12px; }
      .toolbar { padding: 8px 32px 4px; }
    }
    @media (min-width: 1024px) {
      .header { max-width: 1200px; margin: 0 auto; padding: 32px 48px 16px; }
      .toolbar { max-width: 1200px; margin: 0 auto; padding: 8px 48px 4px; }
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 24px 12px;
    }
    .section-title h2 {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .section-title span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 400;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    @media (min-width: 600px) {
      .section-title { padding: 16px 32px 12px; }
    }
    @media (min-width: 1024px) {
      .section-title { max-width: 1200px; margin: 0 auto; padding: 20px 48px 16px; }
    }

    /* ===== CATALOG GRID ===== */
    .catalog {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 0 24px 24px;
    }

    /* ===== ITEM CARD ===== */
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .item-card:hover { border-color: var(--border-strong); }
    .item-card:active { opacity: 0.9; }

    .item-card__image {
      position: relative;
      aspect-ratio: 1 / 1;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .item-card__image .placeholder-icon {
      font-size: 2.5rem;
      color: var(--text-dim);
      opacity: 0.5;
    }
    .item-card__image .placeholder-icon.white { color: rgba(255,255,255,0.3); }
    .item-card__image .price-tag {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: var(--accent);
      color: #FFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 2px;
      letter-spacing: 0.5px;
    }
    .item-card__image .like-btn { position: absolute; top: 8px; left: 8px; font-size: 1.1rem; color: #C5C0B8; cursor: pointer; transition: all 0.2s; z-index: 2; background: none; border: none; }
    .item-card__image .like-btn:active { transform: scale(0.9); }
    .item-card__image .like-btn.liked { color: #C0392B; }
    .item-card__image .like-btn.liked i { font-weight: 900; }

    .item-card__video-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: #FFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 2px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .item-card__video-badge i { font-size: 0.5rem; }

    .item-card__info {
      background: var(--bg);
      padding: 12px 14px 14px;
    }
    .item-card__title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-card__meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .item-card__meta i { font-size: 0.55rem; }

    /* ===== ITEM CARD BG VARIANTS ===== */
    .item-card:nth-child(1) .item-card__image { background: #2D2D2D; }
    .item-card:nth-child(2) .item-card__image { background: #3A2A1A; }
    .item-card:nth-child(3) .item-card__image { background: #1A2A3A; }
    .item-card:nth-child(4) .item-card__image { background: #2A1A2A; }
    .item-card:nth-child(5) .item-card__image { background: #1A3A2A; }
    .item-card:nth-child(6) .item-card__image { background: #3A3A1A; }
    .item-card:nth-child(7) .item-card__image { background: #2A2A3A; }
    .item-card:nth-child(8) .item-card__image { background: #3A2A3A; }
    .item-card:nth-child(9) .item-card__image { background: #1A1A2A; }
    .item-card:nth-child(10) .item-card__image { background: #2A3A2A; }
    .item-card:nth-child(11) .item-card__image { background: #3A1A1A; }
    .item-card:nth-child(12) .item-card__image { background: #1A3A3A; }
    .item-card:nth-child(13) .item-card__image { background: #2D3D2D; }
    .item-card:nth-child(14) .item-card__image { background: #3A2A2A; }
    .item-card:nth-child(15) .item-card__image { background: #1A3A1A; }
    .item-card:nth-child(16) .item-card__image { background: #2A2A1A; }
    .item-card:nth-child(17) .item-card__image { background: #2A3A1A; }
    .item-card:nth-child(18) .item-card__image { background: #3A1A2A; }
    .item-card:nth-child(19) .item-card__image { background: #1A1A3A; }
    .item-card:nth-child(20) .item-card__image { background: #3A3A2A; }
    .item-card:nth-child(21) .item-card__image { background: #1A2A1A; }
    .item-card:nth-child(22) .item-card__image { background: #2D1A2A; }
    .item-card:nth-child(23) .item-card__image { background: #3A3A3A; }
    .item-card:nth-child(24) .item-card__image { background: #2A1A1A; }
    .item-card:nth-child(25) .item-card__image { background: #1A2A2A; }
    .item-card:nth-child(26) .item-card__image { background: #2D2A3A; }
    .item-card:nth-child(27) .item-card__image { background: #3A2D1A; }
    .item-card:nth-child(28) .item-card__image { background: #1A1A1A; }
    .item-card:nth-child(29) .item-card__image { background: #2A3D2A; }
    .item-card:nth-child(30) .item-card__image { background: #3A1A3A; }
    .item-card:nth-child(31) .item-card__image { background: #1A3D3A; }
    .item-card:nth-child(32) .item-card__image { background: #2D2A1A; }
    .item-card:nth-child(33) .item-card__image { background: #2D2D2D; }
    .item-card:nth-child(34) .item-card__image { background: #3A2A1A; }
    .item-card:nth-child(35) .item-card__image { background: #1A2A3A; }
    .item-card:nth-child(36) .item-card__image { background: #2A1A2A; }
    .item-card:nth-child(37) .item-card__image { background: #1A3A2A; }
    .item-card:nth-child(38) .item-card__image { background: #3A3A1A; }
    .item-card:nth-child(39) .item-card__image { background: #2A2A3A; }
    .item-card:nth-child(40) .item-card__image { background: #3A2A3A; }
    .item-card:nth-child(41) .item-card__image { background: #1A1A2A; }
    .item-card:nth-child(42) .item-card__image { background: #2A3A2A; }
    .item-card:nth-child(43) .item-card__image { background: #3A1A1A; }
    .item-card:nth-child(44) .item-card__image { background: #1A3A3A; }
    .item-card:nth-child(45) .item-card__image { background: #2D3D2D; }
    .item-card:nth-child(46) .item-card__image { background: #3A2A2A; }
    .item-card:nth-child(47) .item-card__image { background: #1A3A1A; }
    .item-card:nth-child(48) .item-card__image { background: #2A2A1A; }
    .item-card:nth-child(49) .item-card__image { background: #2A3A1A; }
    .item-card:nth-child(50) .item-card__image { background: #3A1A2A; }
    .item-card:nth-child(51) .item-card__image { background: #1A1A3A; }
    .item-card:nth-child(52) .item-card__image { background: #3A3A2A; }
    .item-card:nth-child(53) .item-card__image { background: #1A2A1A; }
    .item-card:nth-child(54) .item-card__image { background: #2D1A2A; }
    .item-card:nth-child(55) .item-card__image { background: #3A3A3A; }
    .item-card:nth-child(56) .item-card__image { background: #2A1A1A; }
    .item-card:nth-child(57) .item-card__image { background: #1A2A2A; }
    .item-card:nth-child(58) .item-card__image { background: #2D2A3A; }
    .item-card:nth-child(59) .item-card__image { background: #3A2D1A; }
    .item-card:nth-child(60) .item-card__image { background: #1A1A1A; }
    .item-card:nth-child(61) .item-card__image { background: #2A3D2A; }
    .item-card:nth-child(62) .item-card__image { background: #3A1A3A; }
    .item-card:nth-child(63) .item-card__image { background: #1A3D3A; }
    .item-card:nth-child(64) .item-card__image { background: #2D2A1A; }
    .item-card:nth-child(65) .item-card__image { background: #2D2D2D; }
    .item-card:nth-child(66) .item-card__image { background: #3A2A1A; }
    .item-card:nth-child(67) .item-card__image { background: #1A2A3A; }
    .item-card:nth-child(68) .item-card__image { background: #2A1A2A; }
    .item-card:nth-child(69) .item-card__image { background: #1A3A2A; }
    .item-card:nth-child(70) .item-card__image { background: #3A3A1A; }

    /* ===== RESPONSIVE GRID ===== */
    @media (min-width: 600px) {
      .catalog {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 0 32px 32px;
      }
    }
    @media (min-width: 1024px) {
      .catalog {
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 48px 48px;
      }
    }
    @media (max-width: 380px) {
      .catalog { gap: 12px; padding: 0 16px 16px; }
      .item-card__info {
      background: var(--bg); padding: 10px 12px 12px; }
      .item-card__title { font-size: 0.78rem; }
      .item-card__image .price-tag { font-size: 0.7rem; padding: 3px 8px; }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .empty-state__icon {
      width: 80px;
      height: 80px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--text-dim);
      margin-bottom: 24px;
    }
    .empty-state__title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state__text {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-bottom: 24px;
      max-width: 280px;
    }
    .empty-state__btn {
      padding: 12px 24px;
      border: 1px solid var(--border);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      transition: background 0.2s;
    }
    .empty-state__btn:hover { background: var(--border); }

    /* ===== FILTER MODAL ===== */
    .filter-modal-overlay {
      position: sticky;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .filter-modal-overlay.visible { display: flex; }
    .filter-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      width: 100%;
      max-height: 80vh;
      overflow: hidden;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .filter-modal__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .filter-modal__title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .filter-modal__header button {
      width: 36px; height: 36px;
      display: flex;
      align-items: center; justify-content: center;
      color: var(--text-sub);
      font-family: 'IBM Plex Mono', monospace;
    }
    .filter-modal__content {
      padding: 24px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .filter-group {
      margin-bottom: 24px;
    }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-group__title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-sub);
      margin-bottom: 12px;
    }
    .filter-range {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .filter-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      background: var(--surface);
    }
    .filter-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      background: var(--surface);
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filter-chip {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: var(--surface);
      color: var(--text);
      transition: all 0.2s;
    }
    .filter-chip:hover { border-color: var(--border-strong); }
    .filter-chip.active {
      background: var(--accent);
      color: var(--surface);
      border-color: var(--accent);
    }
    .filter-modal__footer {
      display: flex;
      gap: 12px;
      padding: 20px 24px;
      border-top: 1px solid var(--border);
    }
    .filter-btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: 2px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

<script>
// Cargar productos desde la API (proxy de Vite /api → backend)
async function loadCatalog() {
  try {
    const res = await fetch('/api/products/?limit=70');
    const data = await res.json();
    renderProducts(data.items);
  } catch(e) {
    document.getElementById('catalog').innerHTML = '<div class="empty-state"><div class="empty-state__icon"><i class="fas fa-box-open"></i></div><div class="empty-state__title">No hay productos aún</div><div class="empty-state__text">Sé el primero en publicar un artículo</div><a href="/subir" class="empty-state__btn"><i class="fas fa-plus"></i> Publicar artículo</a></div>';
  }
}

const BG_COLORS = ["#2D2D2D","#3A2A1A","#1A2A3A","#2A1A2A","#1A3A2A","#3A3A1A","#2A2A3A","#3A2A3A","#1A1A2A","#2A3A2A","#3A1A1A","#1A3A3A","#2D3D2D","#3A2A2A","#1A3A1A","#2A2A1A","#2A3A1A","#3A1A2A","#1A1A3A","#3A3A2A"];

function renderProducts(products) {
  const catalog = document.getElementById('catalog');
  const count = document.getElementById('articleCount');
  if (count) count.textContent = products.length + ' artículos';
  if (products.length === 0) {
    catalog.innerHTML = '<div class="empty-state"><div class="empty-state__icon"><i class="fas fa-box-open"></i></div><div class="empty-state__title">No hay productos aún</div><div class="empty-state__text">Sé el primero en publicar un artículo</div><a href="/subir" class="empty-state__btn"><i class="fas fa-plus"></i> Publicar artículo</a></div>';
    return;
  }
  catalog.innerHTML = products.map((p, i) => {
    const bg = BG_COLORS[i % BG_COLORS.length];
    const cond = p.condition === 'like_new' ? 'Como nuevo' : p.condition === 'good' ? 'Buen estado' : p.condition;
    return '<div class="item-card" onclick="window.location.href='/articulo/' + p.id + ''">' +
      '<div class="item-card__image" style="background:' + bg + '">' +
      '<button class="like-btn" onclick="event.stopPropagation();this.classList.toggle('liked')"><i class="far fa-heart"></i></button>' +
      '<i class="fas fa-box placeholder-icon white"></i>' +
      '<span class="price-tag">€' + p.price + '</span>' +
      '</div>' +
      '<div class="item-card__info">' +
      '<div class="item-card__title">' + p.title + ' · ' + cond + '</div>' +
      '</div>' +
      '</div>';
  }).join('');
}

loadCatalog();
</script>

      </div>
      <div class="filter-modal__footer">
        <button class="filter-btn filter-btn--secondary" onclick="resetFilters()">Restablecer</button>
        <button class="filter-btn filter-btn--primary" onclick="applyFilters()">Aplicar filtros</button>
      </div>
    </div>
  </div>

  <!-- ===== JAVASCRIPT ===== -->
  <script>
    // ===== STATE =====
    const searchInput = document.getElementById('searchInput');
    const catalog = document.getElementById('catalog');
    const emptyState = document.getElementById('emptyState');
    const items = document.querySelectorAll('.item-card');
    let activeCategory = 'all';

    // ===== CATEGORY COUNTS =====
    function updateItemCounts() {
      const counts = {};
      items.forEach(item => {
        const cat = item.dataset.category || 'all';
        counts[cat] = (counts[cat] || 0) + 1;
      });
      document.querySelectorAll('.filter-pill .count').forEach(el => {
        const cat = el.closest('.filter-pill')?.dataset.category;
        if (cat && cat !== 'all' && counts[cat] !== undefined) {
          el.textContent = counts[cat];
        }
      });
    }

    function updateArticleCount() {
      var visible = 0;
      var query = searchInput.value.toLowerCase().trim();
      var modalCat = (document.getElementById('categorySelect')||{}).value || '';
      var modalSub = (document.getElementById('subcategorySelect')||{}).value || '';
      var priceMin = parseFloat((document.getElementById('priceMin')||{}).value) || 0;
      var priceMax = parseFloat((document.getElementById('priceMax')||{}).value) || Infinity;
      items.forEach(item => {
        var cat = item.dataset.category || '';
        var title = item.querySelector('.item-card__title').textContent.toLowerCase();
        var itemPrice = parseFloat(item.dataset.price) || 0;
        var subcat = item.dataset.subcategory || '';
        var matchesCategory = activeCategory === 'all' || cat === activeCategory;
        var matchesSearch = !query || title.includes(query);
        var matchesModalCat = !modalCat || cat === modalCat;
        var matchesModalSub = !modalSub || subcat === modalSub;
        var matchesPrice = itemPrice >= priceMin && itemPrice <= priceMax;
        if (matchesCategory && matchesSearch && matchesModalCat && matchesModalSub && matchesPrice) visible++;
      });
      document.getElementById('articleCount').textContent = visible + ' artículos';
    }

    function filterByCategory(category) {
      activeCategory = category;
      document.querySelectorAll('.filter-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.category === category);
      });
      applyCurrentFilters();
    }

    // ===== APPLY ALL FILTERS =====
    function applyCurrentFilters() {
      const query = searchInput.value.toLowerCase().trim();
      let visibleCount = 0;
      items.forEach(item => {
        const cat = item.dataset.category || '';
        const title = item.querySelector('.item-card__title').textContent.toLowerCase();
        const matchesCategory = activeCategory === 'all' || cat === activeCategory;
        const matchesSearch = !query || title.includes(query);
        if (matchesCategory && matchesSearch) {
          item.style.display = '';
          visibleCount++;
        } else {
          item.style.display = 'none';
        }
      });
      var sortChip = document.querySelector('[data-sort].active');
      if (sortChip && sortChip.dataset.sort !== 'relevance') {
        var order = sortChip.dataset.sort;
        var catEl = document.getElementById('catalog');
        var visibleItems = Array.from(items).filter(function(it) { return it.style.display !== 'none'; });
        if (order === 'price-asc') {
          visibleItems.sort(function(a, b) { return (parseFloat(a.dataset.price)||0) - (parseFloat(b.dataset.price)||0); });
        } else if (order === 'price-desc') {
          visibleItems.sort(function(a, b) { return (parseFloat(b.dataset.price)||0) - (parseFloat(a.dataset.price)||0); });
        } else if (order === 'newest') {
          visibleItems.reverse();
        }
        visibleItems.forEach(function(item) { catEl.appendChild(item); });
      }
      if (visibleCount === 0) {
        emptyState.style.display = 'flex';
        catalog.style.display = 'none';
      } else {
        emptyState.style.display = 'none';
        catalog.style.display = 'grid';
      }
      updateArticleCount();
    }

    // ===== SEARCH =====
    searchInput.addEventListener('input', applyCurrentFilters);
    function clearSearch() {
      searchInput.value = '';
      applyCurrentFilters();
      searchInput.focus();
    }

    // ===== NAVIGATION =====
    function goToNotifs() { window.parent.location.href = '../v11-notificaciones/'; }
    function goToProfile() { window.parent.location.href = '../v4-perfil/'; }
    function goToHome() { window.parent.location.href = '../v1-catalogo/'; }
    function goToSearch() { window.parent.location.href = '../v1-catalogo/'; }
    function goToUpload() { window.parent.location.href = '../v3-subir/'; }
    function goToCatalog() { window.parent.location.href = '../v1-catalogo/'; }
    function goToDetail(id) { window.parent.location.href = '../v2-detalle/?id=' + id; }
    function goToMatches() { window.parent.location.href = '../v12-mis-matches/'; }

    console.log('📱 treqe v1 - Catálogo · 70 productos demo');

    // ===== FILTERS =====
    function openFilters() {
      const modal = document.getElementById('filterModal');
      if (modal) {
        modal.classList.add('visible');
        document.body.style.overflow = 'hidden';
      } else {
        alert('Filtros disponibles en versión completa');
      }
    }
    function closeFilters() {
      const modal = document.getElementById('filterModal');
      if (modal) {
        modal.classList.remove('visible');
        document.body.style.overflow = '';
      }
    }

    const subcategories = {
      electronica: ['Móviles', 'Portátiles', 'Tablets', 'Cámaras', 'Audio', 'Consolas', 'Accesorios', 'TV y Proyectores', 'Smartwatches', 'Componentes PC', 'Periféricos'],
      moda: ['Ropa hombre', 'Ropa mujer', 'Zapatos', 'Bolsos', 'Relojes', 'Joyería', 'Vintage', 'Accesorios', 'Belleza'],
      deporte: ['Bicicletas', 'Fitness', 'Running', 'Natación', 'Fútbol', 'Padel', 'Camping', 'Montaña y Ski', 'Baloncesto', 'Golf', 'Yoga', 'Pesas', 'Patines'],
      musica: ['Guitarras', 'Baterías', 'Teclados', 'Vinilos', 'Equipos DJ', 'Instrumentos viento', 'Micrófonos', 'Partituras'],
      hogar: ['Muebles', 'Decoración', 'Electrodomésticos', 'Jardín', 'Bricolaje', 'Lámparas', 'Cocina', 'Baño', 'Textiles', 'Mascotas', 'Calefacción'],
      libros: ['Novelas', 'Cómics', 'Académicos', 'Infantil', 'Idiomas', 'Arte', 'Revistas', 'Ensayo'],
      motor: ['Coches', 'Motos', 'Recambios coche', 'Recambios moto', 'GPS', 'Herramientas', 'Neumáticos', 'Accesorios'],
      inmuebles: ['Pisos', 'Casas', 'Garajes', 'Locales', 'Terrenos', 'Oficinas', 'Habitaciones'],
      bicicletas: ['Bicis montaña', 'Bicis carretera', 'Bicis eléctricas', 'Cascos', 'Componentes', 'Accesorios', 'Ropa ciclismo'],
      electrodomesticos: ['Cocina', 'Lavandería', 'Climatización', 'Pequeño electro', 'Aspiradoras', 'Recambios'],
      bebes: ['Ropa bebé', 'Juguetes', 'Carritos', 'Sillas coche', 'Cunas', 'Alimentación', 'Seguridad', 'Maternidad'],
      coleccionismo: ['Antigüedades', 'Monedas', 'Sellos', 'Cromos', 'Figuras', 'Pósters', 'Postales'],
      construccion: ['Puertas', 'Ventanas', 'Suelos', 'Pintura', 'Ferretería', 'Andamios', 'Electricidad', 'Baños'],
      industria: ['Agricultura', 'Maquinaria', 'Herramientas', 'Recambios', 'Tractores'],
      empleo: ['Ofertas empleo', 'Busco empleo'],
      servicios: ['Clases', 'Limpieza', 'Mudanzas', 'Reparaciones', 'Canguros', 'Terapias', 'Fontanería', 'Electricista'],
      otros: ['Varios']
    };

    function updateSubcategories() {
      const category = document.getElementById('categorySelect').value;
      const subGroup = document.getElementById('subcategoryGroup');
      const subSelect = document.getElementById('subcategorySelect');
      if (category && subcategories[category]) {
        subGroup.style.display = 'block';
        subSelect.innerHTML = '<option value="">Todas</option>' +
          subcategories[category].map(sub => `<option value="${sub.toLowerCase().replace(/ /g, '-')}">${sub}</option>`).join('');
      } else {
        subGroup.style.display = 'none';
        subSelect.innerHTML = '<option value="">Todas</option>';
      }
    }

    function setPriceRange(min, max, el) {
      if (!el) return;
      document.getElementById('priceMin').value = min || '';
      document.getElementById('priceMax').value = max || '';
      document.querySelectorAll('.filter-quick-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
    }

    function getVisibleCount() {
      let count = 0;
      items.forEach(item => { if (item.style.display !== 'none') count++; });
      return count;
    }

    function applyFilters() {
      closeFilters();
      activeCategory = 'all';
      const category = document.getElementById('categorySelect').value;
      const subcategory = document.getElementById('subcategorySelect').value;
      const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
      const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
      const condition = document.querySelector('[data-condition].active')?.dataset.condition || 'any';
      const query = searchInput.value.toLowerCase().trim();

      let visibleCount = 0;
      items.forEach(item => {
        const itemPrice = parseFloat(item.dataset.price) || 0;
        const itemCat = item.dataset.category || '';
        const itemSubcat = item.dataset.subcategory || '';
        const title = item.querySelector('.item-card__title').textContent.toLowerCase();
        const matchesCategory = !category || itemCat === category;
        const matchesSubcategory = !subcategory || itemSubcat === subcategory;
        const matchesPrice = itemPrice >= priceMin && itemPrice <= priceMax;
        const matchesSearch = !query || title.includes(query);
        if (matchesCategory && matchesSubcategory && matchesPrice && matchesSearch) {
          item.style.display = '';
          visibleCount++;
        } else {
          item.style.display = 'none';
        }
      });

      var sortChip = document.querySelector('[data-sort].active');
      if (sortChip && sortChip.dataset.sort !== 'relevance') {
        var order = sortChip.dataset.sort;
        var catEl = document.getElementById('catalog');
        var visibleItems = Array.from(items).filter(function(it) { return it.style.display !== 'none'; });
        if (order === 'price-asc') {
          visibleItems.sort(function(a, b) { return (parseFloat(a.dataset.price)||0) - (parseFloat(b.dataset.price)||0); });
        } else if (order === 'price-desc') {
          visibleItems.sort(function(a, b) { return (parseFloat(b.dataset.price)||0) - (parseFloat(a.dataset.price)||0); });
        } else if (order === 'newest') {
          visibleItems.reverse();
        }
        visibleItems.forEach(function(item) { catEl.appendChild(item); });
      }

      if (visibleCount === 0) {
        emptyState.style.display = 'flex';
        catalog.style.display = 'none';
      } else {
        emptyState.style.display = 'none';
        catalog.style.display = 'grid';
      }
      updateArticleCount();

      const activeFiltersEl = document.getElementById('activeFilters');
      let filtersHTML = '';
      if (category) filtersHTML += `<div class="active-filter" data-filter="category"><span>${document.getElementById('categorySelect').options[document.getElementById('categorySelect').selectedIndex].text}</span><button onclick="removeFilter('category')"><i class="fas fa-times"></i></button></div>`;
      if (priceMin > 0 || priceMax < Infinity) filtersHTML += `<div class="active-filter" data-filter="price"><span>€${priceMin || 0} - €${priceMax === Infinity ? '∞' : priceMax}</span><button onclick="removeFilter('price')"><i class="fas fa-times"></i></button></div>`;
      if (condition !== 'any') filtersHTML += `<div class="active-filter" data-filter="condition"><span>${document.querySelector('[data-condition].active').textContent}</span><button onclick="removeFilter('condition')"><i class="fas fa-times"></i></button></div>`;

      if (filtersHTML) {
        activeFiltersEl.innerHTML = filtersHTML + '<button class="clear-all-filters" onclick="clearAllFilters()">Limpiar todo</button>';
        activeFiltersEl.classList.add('visible');
        activeFiltersEl.style.padding = '10px ' + (window.innerWidth >= 1024 ? '48px' : window.innerWidth >= 600 ? '32px' : '24px') + ' 14px ' + (window.innerWidth >= 1024 ? '48px' : window.innerWidth >= 600 ? '32px' : '24px');
        if (window.innerWidth >= 1024) { activeFiltersEl.style.maxWidth = '1200px'; activeFiltersEl.style.margin = '0 auto'; } else { activeFiltersEl.style.maxWidth = ''; activeFiltersEl.style.margin = ''; }
      } else {
        activeFiltersEl.innerHTML = '';
        activeFiltersEl.classList.remove('visible');
      }
      console.log('Filtros aplicados:', { category, subcategory, priceMin, priceMax, condition, resultados: getVisibleCount() });
    }

    function removeFilter(filterType) {
      if(filterType==='price'){var pm=document.getElementById('priceMin');pm.style.border='3px solid green';setTimeout(function(){pm.style.border='';},2000);}
      if (filterType === 'category') {
        document.getElementById('categorySelect').value = '';
        document.getElementById('subcategorySelect').value = '';
        updateSubcategories();
      }
      if (filterType === 'subcategory') {
        document.getElementById('subcategorySelect').value = '';
      }
      if (filterType === 'price') {
        document.getElementById('priceMin').value = '';
        document.getElementById('priceMax').value = '';
        document.querySelectorAll('.filter-quick-btn').forEach(b => b.classList.remove('active'));
      }
      if (filterType === 'condition') {
        document.querySelectorAll('[data-condition]').forEach(c => c.classList.remove('active'));
        var ac = document.querySelector('[data-condition="any"]'); if(ac) ac.classList.add('active');
      }
      applyFilters();
      var af = document.getElementById('activeFilters');
      if (af && af.querySelectorAll('.active-filter').length === 0) {
        af.innerHTML = '';
        af.classList.remove('visible');
      }
    }
    function clearAllFilters() {
      var cs=document.getElementById('categorySelect'),ss=document.getElementById('subcategorySelect');
      if(cs)cs.value='';if(ss)ss.value='';updateSubcategories();
      var pm=document.getElementById('priceMin'),px=document.getElementById('priceMax');
      if(pm)pm.value='';if(px)px.value='';
      document.querySelectorAll('.filter-quick-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('[data-condition]').forEach(c=>c.classList.remove('active'));
      var ac=document.querySelector('[data-condition="any"]');if(ac)ac.classList.add('active');
      document.querySelectorAll('.filter-chips--sort .filter-chip').forEach(c=>c.classList.remove('active'));
      var rs=document.querySelector('[data-sort="relevance"]');if(rs)rs.classList.add('active');
      document.querySelectorAll('.item-card').forEach(i=>i.style.display='');
      var af=document.getElementById('activeFilters');if(af){af.innerHTML='';af.style.padding = ''; af.style.maxWidth = ''; af.style.margin = '';}
      document.getElementById('filterModal').classList.remove('visible');
      document.body.style.overflow='';
      activeCategory='all';
      applyCurrentFilters();
    }
    function resetFilters() { clearAllFilters(); }

    // ===== PAGING =====
    const BATCH_SIZE = 20;
    let currentBatch = 0;
    const pageItems = Array.from(document.querySelectorAll('.item-card'));
    const pageTotal = pageItems.length;

    function showChunk(num) {
        const end = Math.min((num + 1) * BATCH_SIZE, pageTotal);
        pageItems.forEach((item, i) => {
            item.style.display = (i < end) ? '' : 'none';
        });
        currentBatch = num;
        updateArticleCount();
        updateItemCounts();
    }

    function loadChunk() {
        const next = currentBatch + 1;
        const end = Math.min((next + 1) * BATCH_SIZE, pageTotal);
        if (end > currentBatch * BATCH_SIZE) {
            for (let i = currentBatch * BATCH_SIZE; i < end; i++) {
                pageItems[i].style.display = '';
            }
            currentBatch = next;
            if (end >= pageTotal) {
                const loader = document.getElementById('pagingLoader');
                if (loader) loader.style.display = 'none';
            }
            updateArticleCount();
            updateItemCounts();
        }
    }

    let isLoading = false;
    window.addEventListener('scroll', function() {
        if (isLoading) return;
        const sentinel = document.getElementById('pagingSentinel');
        if (!sentinel || sentinel.style.display === 'none') return;
        const rect = sentinel.getBoundingClientRect();
        var isNearBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200;
        if (isNearBottom) {
            isLoading = true;
            loadChunk();
            setTimeout(function() { isLoading = false; }, 800);
        }
    });

    const origFilter = filterByCategory;
    filterByCategory = function(cat) {
        pageItems.forEach(i => i.style.display = '');
        origFilter(cat);
        if (cat === 'all') showChunk(currentBatch);
    };

    showChunk(0);
    updateItemCounts();
    updateArticleCount();

    function goToDiscover() { window.parent.location.href = '../v1-catalogo/'; }
    function goToTrades() { window.parent.location.href = '../v12-mis-matches/'; }
    function goToInbox() { window.parent.location.href = '../v11-notificaciones/'; }
    function goToUpload() { window.parent.location.href = '../v3-subir/'; }
    function goToProfile() { window.parent.location.href = '../v4-perfil/'; }

    function pickSort(chip){
      var sort = chip.dataset.sort;
      chip.parentElement.parentElement.querySelectorAll(".filter-chip").forEach(function(c){c.classList.remove("active")});
      chip.classList.add("active");
      pickSortFromDropdown(chip, sort);
    }
    function pickCondition(chip){
      chip.parentElement.querySelectorAll(".filter-chip").forEach(function(c){c.classList.remove("active")});
      chip.classList.add("active");
    }

    function toggleSearch() {
      var icon = document.getElementById('searchIcon');
      var expand = document.getElementById('searchExpand');
      var input = document.getElementById('searchInput');
      if (expand.classList.contains('open')) {
        expand.classList.remove('open');
        setTimeout(function() { icon.style.opacity = '1';
        var blog = document.querySelector('.blog-link'); if(blog) blog.style.opacity = '1'; }, 200);
        if (typeof onSearchInput === 'function') { input.value = ''; onSearchInput(); }
      } else {
        icon.style.opacity = '0';
        var blog = document.querySelector('.blog-link'); if(blog) blog.style.opacity = '0';
        expand.classList.add('open');
        setTimeout(function() { input.focus(); }, 300);
      }
    }
    function toggleSortDropdown() {
      var dd = document.getElementById('sortDropdown');
      dd.classList.toggle('open');
    }
    function pickSortFromDropdown(btn, sort) {
      var dd = document.getElementById('sortDropdown');
      dd.querySelectorAll('.sort-option').forEach(function(o) { o.classList.remove('active'); });
      btn.classList.add('active');
      dd.classList.remove('open');
      var items = Array.from(document.querySelectorAll('.item-card'));
      var visible = items.filter(function(i) { return i.style.display !== 'none'; });
      var catalog = document.getElementById('catalog');
      if (sort === 'price-asc') {
        visible.sort(function(a, b) { return (parseFloat(a.dataset.price)||0) - (parseFloat(b.dataset.price)||0); });
      } else if (sort === 'price-desc') {
        visible.sort(function(a, b) { return (parseFloat(b.dataset.price)||0) - (parseFloat(a.dataset.price)||0); });
      } else if (sort === 'recent') {
        visible.reverse();
      }
      visible.forEach(function(item) { catalog.appendChild(item); });
    }
    document.addEventListener('click', function(e) {
      var dd = document.getElementById('sortDropdown');
      var wrapper = document.querySelector('.sort-wrapper');
      if (dd && wrapper && !wrapper.contains(e.target)) {
        dd.classList.remove('open');
      }
    });

    (function() {
      var params = new URLSearchParams(window.location.search);
      var q = params.get('search');
      if (q) {
        var input = document.getElementById('searchInput');
        input.value = q;
        if (typeof applyCurrentFilters === 'function') applyCurrentFilters();
      }
    })();

    // Trade Request Buttons
    (function(){
      var requested = JSON.parse(localStorage.getItem('treqe_trade_requests') || '[]');
      document.querySelectorAll('.item-card').forEach(function(card){
        var onclick = card.getAttribute('onclick');
        var idMatch = onclick && onclick.match(/goToDetail\((\d+)\)/);
        if (!idMatch) return;
        var id = idMatch[1];
        var isReq = requested.indexOf(id) !== -1;
        var btn = document.createElement('button');
        btn.className = 'trade-btn' + (isReq ? ' requested' : '');
        btn.innerHTML = '<i class="fas fa-exchange-alt"></i>';
        btn.setAttribute('aria-label', 'Solicitar trueque');
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          if (window.parent && window.parent.location) {
            window.parent.location.href = '../v2-detalle/?id=' + id;
          } else {
            window.location.href = '../v2-detalle/?id=' + id;
          }
        });
        var img = card.querySelector(".item-card__image");
        if (img) { img.style.position = "relative"; img.appendChild(btn); }
      });
    })();
  
(function() {
  if (localStorage.getItem('treqe-darkmode') === 'true') {
    document.body.classList.add('dark');
  }
})();

</script>
</body>
