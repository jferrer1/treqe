<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>treqe — Metodos de pago</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
html { font-size: 17px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; overflow-y: scroll; }
body {
  font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F9F7F2; color: #1C1915;
  min-height: 100dvh; padding-bottom: 90px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
body.dark { background: #130B00; color: #E8E2D6; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
:root{--bg:#F9F7F2;--surface:#FFF;--text:#1C1915;--text-sub:#55504B;--text-dim:#8A8580;--border:#E5E0D8;--border-strong:#C5C0B8;--accent:#1C1915;--font-mono:"IBM Plex Mono",monospace;--font-sans:"IBM Plex Sans",sans-serif;}body.dark{--bg:#130B00;--surface:#1A1206;--text:#E8E2D6;--text-sub:#B0A9A0;--text-dim:#7A7570;--border:#3A3630;--border-strong:#5A5650;--accent:#E8E2D6;}
.treqe-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
body.dark .treqe-header{background:#130B00;border-color:#3A3630;}
.treqe-header__left{display:flex;align-items:center;gap:8px;}
.treqe-header__back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text-sub);font-size:.9rem;border-radius:2px;border:1px solid var(--border);background:transparent;cursor:pointer;}
body.dark .treqe-header__back{color:#B0A9A0;border-color:#3A3630;}
.treqe-header__title{font-family:"IBM Plex Sans",sans-serif;font-size:1rem;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
body.dark .treqe-header__title{color:#E8E2D6;}
.treqe-header__right{display:flex;align-items:center;gap:8px;}
.container{padding:24px 20px;max-width:600px;margin:0 auto;}
.container h2{font-family:"IBM Plex Sans",sans-serif;font-size:1.2rem;font-weight:600;letter-spacing:-0.3px;margin-bottom:12px;color:var(--text);}
body.dark .container h2{color:#E8E2D6;}
.container p{font-size:0.9rem;color:var(--text-sub);line-height:1.7;margin-bottom:12px;}
body.dark .container p{color:#B0A9A0;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-family:"IBM Plex Mono",monospace;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-sub);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;font-family:"IBM Plex Sans",sans-serif;font-size:0.9rem;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:2px;outline:none;}
body.dark .form-group input,body.dark .form-group select,body.dark .form-group textarea{background:#1A1206;border-color:#3A3630;color:#E8E2D6;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--text);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;font-family:"IBM Plex Mono",monospace;font-size:0.6rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;border:1px solid var(--text);border-radius:2px;background:var(--text);color:var(--bg);cursor:pointer;width:100%;}
.btn:hover{opacity:0.85;}
body.dark .btn{border-color:#E8E2D6;background:#E8E2D6;color:#130B00;}
.card{border:1px solid var(--border);border-radius:2px;padding:16px;background:var(--surface);margin-bottom:12px;display:flex;align-items:center;gap:12px;}
body.dark .card{background:#1A1206;border-color:#3A3630;}
.card i{font-size:1.2rem;color:var(--text-dim);width:24px;text-align:center;}
body.dark .card i{color:#7A7570;}
.card__body{flex:1;}
.card__body h3{font-size:0.9rem;font-weight:600;color:var(--text);margin-bottom:2px;}
body.dark .card__body h3{color:#E8E2D6;}
.card__body p{font-size:0.78rem;color:var(--text-sub);margin:0;}
body.dark .card__body p{color:#B0A9A0;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-evenly;align-items:center;padding:0;height:72px;padding-bottom:12px;z-index:100;isolation:isolate;overflow:hidden;}
.nav-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:"IBM Plex Mono",monospace;font-size:0.55rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);transition:color 0.15s;padding:4px 0;flex:1;max-width:80px;border:none;background:none;cursor:pointer;text-decoration:none;}
.nav-item i{font-size:1rem;}
.nav-item.active{color:var(--text);}.nav-item.active i{color:var(--text);}
.nav-add-btn{width:40px;height:40px;background:var(--text);color:var(--bg);border-radius:2px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}.nav-add-btn i{font-size:1rem;color:var(--bg);}
.nav-badge{width:5px;height:5px;background:var(--text);border-radius:50%;position:absolute;top:2px;right:4px;}
body.dark .bottom-nav{background:#1A1206;border-color:#3A3630;}
body.dark .nav-item{color:#7A7570;}
body.dark .nav-item i{color:#7A7570;}
body.dark .nav-item.active{color:#E8E2D6;}
body.dark .nav-item.active i{color:#E8E2D6;}
body.dark .nav-add-btn{background:#E8E2D6;color:#130B00;}
body.dark .nav-add-btn i{color:#130B00;}

body.dark .profile-wrap, body.dark .settings-wrap, body.dark .form-wrap, body.dark .detail-layout, body.dark .inbox-content, body.dark .notif-list, body.dark .container, body.dark .page, body.dark .catalog, body.dark .verify-hero, body.dark .progress-wrap { background: #130B00 !important; }
body.dark .card, body.dark [class*="-card"], body.dark [class*="item-card"], body.dark [class*="settings-item"], body.dark [class*="verify-card"], body.dark [class*="match-card"], body.dark [class*="profile-action"] { background: #1A1206 !important; border-color: #3A3630 !important; }
body.dark [class*="-card"] h3, body.dark [class*="-card"] .title, body.dark [class*="settings-item"] h3 { color: #E8E2D6 !important; }
body.dark [class*="-card"] p, body.dark [class*="-card"] span[class*="sub"], body.dark [class*="settings-item"] [class*="sub"] { color: #B0A9A0 !important; }

body.dark{background:#130B00;color:#E8E2D6;}
</style>
</head>
<body>
<div class="treqe-header">
  <div class="treqe-header__left">
    <button class="treqe-header__back" onclick="window.location.href='../v8-ajustes/'" aria-label="Atras"><i class="fas fa-chevron-left"></i></button>
    <span class="treqe-header__title">Metodos de pago</span>
  </div>
  <div class="treqe-header__right"></div>
</div>
<div class="container">

<h2>Metodos de pago</h2>
<p>Gestiona tus tarjetas y metodos de pago para compras y garantias.</p>
<div class="card">
  <i class="fab fa-cc-visa"></i>
  <div class="card__body">
    <h3>Visa terminada en 4242</h3>
    <p>Predeterminada</p>
  </div>
  <i class="fas fa-chevron-right" style="font-size:0.7rem;"></i>
</div>
<div class="card">
  <i class="fab fa-paypal"></i>
  <div class="card__body">
    <h3>PayPal</h3>
    <p>pepe@email.com</p>
  </div>
  <i class="fas fa-chevron-right" style="font-size:0.7rem;"></i>
</div>
<button type="button" class="btn" style="background:transparent;color:var(--text);border-color:var(--border-strong);margin-top:8px;">
  <i class="fas fa-plus"></i> Anadir metodo
</button>

</div>

<script>
(function() {
  if (localStorage.getItem('treqe-darkmode') === 'true') {
    document.body.classList.add('dark');
  }
})();
</script>
</body>
</html>
