<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>treqe — Registro</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#F9F7F2; --surface:#FFF; --text:#1C1915; --text-sub:#55504B; --text-dim:#8A8580; --border:#E5E0D8; --border-strong:#C5C0B8; --accent:#1C1915; }
body.dark { --bg:#130B00; --surface:#1A1206; --text:#E8E2D6; --text-sub:#B0A9A0; --text-dim:#7A7570; --border:#3A3630; --border-strong:#5A5650; --accent:#E8E2D6; }

html { font-size: 17px; -webkit-text-size-adjust: 100%; overflow-y: scroll; }
body {
  font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100dvh; padding-bottom: 90px;
  -webkit-font-smoothing: antialiased; overscroll-behavior: none;
}

/* Header */
.treqe-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
body.dark .treqe-header{background:#130B00;border-color:#3A3630;}
.treqe-header__left{display:flex;align-items:center;gap:8px;}
.treqe-header__back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text-sub);font-size:.9rem;border-radius:2px;border:1px solid var(--border);background:transparent;cursor:pointer;}
body.dark .treqe-header__back{color:#B0A9A0;border-color:#3A3630;}
.treqe-header__title{font-family:'IBM Plex Sans',sans-serif;font-size:1rem;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
body.dark .treqe-header__title{color:#E8E2D6;}
.treqe-header__right{display:flex;align-items:center;gap:8px;}

/* Container */
.container { max-width: 400px; margin: 0 auto; padding: 32px 24px; }

h2 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 8px; text-align: center; }
p.sub { font-size: 0.85rem; color: var(--text-sub); text-align: center; margin-bottom: 32px; }
body.dark p.sub { color: #B0A9A0; }

/* Form */
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-family: 'IBM Plex Mono', monospace;
  font-size: 0.52rem; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--text-dim); margin-bottom: 6px;
}
.form-group input {
  width: 100%; padding: 14px 16px;
  font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem;
  color: var(--text); background: var(--surface);
  border: 1px solid var(--border); border-radius: 2px; outline: none;
}
body.dark .form-group input { background: #1A1206; border-color: #3A3630; color: #E8E2D6; }
.form-group input:focus { border-color: var(--text); }
.form-group input::placeholder { color: var(--text-dim); }

/* Buttons */
.btn {
  width: 100%; padding: 14px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
  font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--text); color: var(--bg);
  border: 1px solid var(--text); border-radius: 2px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s;
}
.btn:hover { opacity: 0.9; }
body.dark .btn { background: #E8E2D6; color: #130B00; border-color: #E8E2D6; }

.btn-google {
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); margin-top: 12px;
}
.btn-google:hover { border-color: var(--text); }
body.dark .btn-google { background: #1A1206; color: #E8E2D6; border-color: #3A3630; }

/* Divider */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 24px 0;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.52rem;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim);
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Checkbox */
.checkbox-group {
  display: flex; align-items: flex-start; gap: 10px;
  margin: 24px 0; font-size: 0.78rem; color: var(--text-sub);
}
.checkbox-group input[type="checkbox"] {
  width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0;
  accent-color: var(--text);
}
.checkbox-group a { color: var(--text); text-decoration: underline; }

/* Footer */
.footer-link {
  text-align: center; margin-top: 24px; font-size: 0.82rem; color: var(--text-sub);
}
.footer-link a { color: var(--text); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>

<div class="treqe-header">
  <div class="treqe-header__left">
    <button class="treqe-header__back" onclick="history.back()" aria-label="Atras"><i class="fas fa-chevron-left"></i></button>
    <span class="treqe-header__title">Registro</span>
  </div>
  <div class="treqe-header__right"></div>
</div>

<div class="container">
  <h2>Crear cuenta</h2>
  <p class="sub">Únete a la comunidad de intercambio circular.</p>

  <button class="btn btn-google" onclick="alert('Google OAuth (demo)')">
    <i class="fab fa-google"></i> Continuar con Google
  </button>

  <button class="btn btn-google" onclick="alert('Apple OAuth (demo)')" style="margin-top:10px;">
    <i class="fab fa-apple"></i> Continuar con Apple
  </button>

  <div class="divider">o con email</div>

  <form onsubmit="event.preventDefault();alert('Registro (demo)')">
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" placeholder="Tu nombre" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="tu@email.com" required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="Mínimo 8 caracteres" required minlength="8">
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="terms" required>
      <label for="terms">Acepto los <a href="../v19-terminos/">términos</a> y la <a href="../v18-privacidad/">política de privacidad</a></label>
    </div>
    <button type="submit" class="btn">Crear cuenta <i class="fas fa-arrow-right"></i></button>
  </form>

  <div class="footer-link">
    ¿Ya tienes cuenta? <a href="../v10-registro/">Iniciar sesión</a>
  </div>
</div>

<script>
(function(){if(localStorage.getItem('treqe-darkmode')==='true'){document.body.classList.add('dark');}})();
</script>
</body>
</html>
