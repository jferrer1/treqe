  <style>

  body.dark {

/* ===== treqe Design System - Taylor Penton Editorial ===== */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F9F7F2;
  color: #1C1915;
  min-height: 100dvh;
  padding-bottom: 90px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background 0.2s, color 0.2s;

  overscroll-behavior: none;}
img { max-width: 100%; display: block; }
button { font-family: 'IBM Plex Mono', monospace; cursor: pointer; border: 1px solid #E5E0D8; background: transparent; border-radius: 2px; color: #1C1915; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; padding: 10px 20px; transition: all 0.15s; }
button:hover { background: #1C1915; color: #FFF; border-color: #1C1915; }
button:active { opacity: 0.7; }
a { text-decoration: none; color: inherit; }
input, textarea, select { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem; border: 1px solid #E5E0D8; border-radius: 2px; padding: 10px 12px; background: #FFF; color: #1C1915; outline: none; transition: border-color 0.15s; width: 100%; }
input:focus, textarea:focus { border-color: #1C1915; }
input::placeholder, textarea::placeholder { color: #8A8580; }

/* ===== Dark Mode ===== */
body.dark { background: #130B00; color: #E8E2D6; }
body.dark input, body.dark textarea, body.dark select { background: #1A1206; border-color: #3A3630; color: #E8E2D6; }
body.dark button { border-color: #3A3630; color: #E8E2D6; }
body.dark button:hover { background: #E8E2D6; color: #130B00; border-color: #E8E2D6; }

/* ===== Typography ===== */
h1, h2, h3, h4 { font-family: 'IBM Plex Sans', sans-serif; font-weight: 400; letter-spacing: -0.02em; line-height: 1.2; }
h1 { font-size: 1.6rem; }
h2 { font-size: 1.2rem; }
h3 { font-size: 1rem; }
p { font-size: 0.9rem; line-height: 1.5; color: #55504B; }
body.dark p { color: #B0A9A0; }

/* ===== Labels / Meta ===== */
.label-mono, label, .mono-label, .tag, .badge, .chip { font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.16em; color: #8A8580; }
body.dark .label-mono, body.dark label, body.dark .mono-label, body.dark .tag { color: #55504B; }

/* ===== Header ===== */
.treqe-header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: #F9F7F2; border-bottom: 1px solid #E5E0D8;
  transition: background 0.2s, border-color 0.2s;
}
body.dark .treqe-header { background: #130B00; border-color: #3A3630; }
.treqe-logo { font-family: 'IBM Plex Sans', sans-serif; font-size: 1.3rem; font-weight: 700; font-style: italic; letter-spacing: -0.03em; color: #1C1915; }
body.dark .treqe-logo { color: #E8E2D6; }



body.dark 
.treqe-dark-toggle { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; padding: 6px 10px; border: 1px solid #E5E0D8; border-radius: 2px; color: #55504B; cursor: pointer; background: transparent; }
body.dark .treqe-dark-toggle { border-color: #3A3630; color: #B0A9A0; }

/* ===== Bottom Nav ===== */
.treqe-bottom-nav {
  position: sticky; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-around;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  background: #F9F7F2; border-top: 1px solid #E5E0D8;
  transition: background 0.2s, border-color 0.2s;
}
body.dark .treqe-bottom-nav { background: #130B00; border-color: #3A3630; }
.treqe-nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-family: 'IBM Plex Mono', monospace; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.12em; color: #8A8580; text-decoration: none; padding: 4px 8px; transition: color 0.15s; }
.treqe-nav-item i { font-size: 0.9rem; color: #55504B; }
body.dark .treqe-nav-item { color: #55504B; }
body.dark .treqe-nav-item i { color: #B0A9A0; }
.treqe-nav-item.active { color: #1C1915; }
.treqe-nav-item.active i { color: #1C1915; }
body.dark .treqe-nav-item.active { color: #E8E2D6; }
body.dark .treqe-nav-item.active i { color: #E8E2D6; }

/* ===== Cards ===== */
.treqe-card { border: 1px solid #E5E0D8; border-radius: 2px; background: #FFF; padding: 16px; }
body.dark .treqe-card { border-color: #3A3630; background: #1A1206; }

/* ===== Utility ===== */
.text-center { text-align: center; }
.text-sub { color: #55504B; }
body.dark .text-sub { color: #B0A9A0; }
.text-dim { color: #8A8580; }
body.dark .text-dim { color: #55504B; }
.mono { font-family: 'IBM Plex Mono', monospace; }
.uppercase { text-transform: uppercase; }
.small { font-size: 0.7rem; }
.gap-8 { gap: 8px; }
.gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.p-16 { padding: 16px; }
.px-16 { padding-left: 16px; padding-right: 16px; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.w-full { width: 100%; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ===== Footer ===== */
.treqe-footer { padding: 24px 16px; font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.12em; color: #8A8580; text-align: center; border-top: 1px solid #E5E0D8; margin-top: 24px; }
body.dark .treqe-footer { border-color: #3A3630; color: #55504B; }

/* ===== Status bar mock ===== */
.status-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px 2px; font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: #8A8580; }
body.dark .status-bar { color: #55504B; }
.status-bar .time { font-weight: 600; }
.status-bar .icons { display: flex; gap: 4px; }

/* ===== Form elements ===== */
.treqe-input { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.9rem; border: 1px solid #E5E0D8; border-radius: 2px; padding: 10px 12px; background: #FFF; color: #1C1915; outline: none; width: 100%; }
body.dark .treqe-input { background: #1A1206; border-color: #3A3630; color: #E8E2D6; }
.treqe-input:focus { border-color: #1C1915; }
body.dark .treqe-input:focus { border-color: #E8E2D6; }

.treqe-select { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; border: 1px solid #E5E0D8; border-radius: 2px; padding: 8px 12px; background: #FFF; color: #1C1915; outline: none; }
body.dark .treqe-select { background: #1A1206; border-color: #3A3630; color: #E8E2D6; }

.treqe-checkbox { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border: 1px solid #E5E0D8; border-radius: 2px; cursor: pointer; flex-shrink: 0; position: relative; background: #FFF; }
body.dark .treqe-checkbox { border-color: #3A3630; background: #1A1206; }
.treqe-checkbox:checked { background: #1C1915; border-color: #1C1915; }
body.dark .treqe-checkbox:checked { background: #E8E2D6; border-color: #E8E2D6; }
.treqe-checkbox:checked::after { content: '\2713'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #FFF; font-size: 0.6rem; font-weight: 700; }
body.dark .treqe-checkbox:checked::after { color: #130B00; }

/* ===== Separator ===== */
.treqe-hr { border: none; border-top: 1px solid #E5E0D8; margin: 16px 0; }
body.dark .treqe-hr { border-color: #3A3630; }

/* ===== Alert / Notice ===== */
.treqe-notice { border: 1px solid #E5E0D8; border-radius: 2px; padding: 12px 16px; font-size: 0.8rem; color: #55504B; }
body.dark .treqe-notice { border-color: #3A3630; color: #B0A9A0; }

/* ===== Pill tag ===== */
.treqe-tag { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.12em; border: 1px solid #E5E0D8; border-radius: 2px; padding: 3px 8px; color: #55504B; }
body.dark .treqe-tag { border-color: #3A3630; color: #B0A9A0; }

/* ===== Demo tag ===== */
.demo-tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.45rem; color: #C5C0B8; text-align: center; padding: 4px; }
body.dark .demo-tag { color: #5A5650; }

/* ===== Empty state ===== */
.treqe-empty { text-align: center; padding: 48px 16px; color: #8A8580; }
body.dark .treqe-empty { color: #55504B; }
.treqe-empty i { font-size: 2rem; margin-bottom: 12px; color: #C5C0B8; }
body.dark .treqe-empty i { color: #5A5650; }
.treqe-empty p { font-size: 0.85rem; }

/* ===== Fade animation ===== */
@keyframes fadeUp { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
  /* ══════ BOTTOM NAV (standardized across all treqe pages) ══════ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-evenly;
  align-items: center;
  height: 68px;
  padding-bottom: 12px;
  z-index: 100;
  isolation: isolate;
  overflow: hidden;
  overflow: hidden;
  transform: translateZ(0);
  will-change: transform;
}

.nav-item {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  font-family: var(--font-mono);
  font-size: 0.5rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  transition: color 0.15s;
  padding: 4px 0;
  flex: 1;
  max-width: 80px;
  border: none;
  background: none;
  cursor: pointer;
  text-decoration: none;
}

.nav-item i { font-size: 1.1rem; }

.nav-item.active { color: var(--text); }
.nav-item.active i { color: var(--text); }

.nav-item .nav-add-btn,
.nav-add-btn {
  width: 42px;
  height: 42px;
  background: var(--text);
  color: var(--bg);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 2px;
}

.nav-item .nav-add-btn i,
.nav-add-btn i {
  font-size: 1rem;
  color: var(--bg);
}

.nav-badge {
  width: 5px;
  height: 5px;
  background: var(--text);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  right: 4px;
}

body.dark .bottom-nav{background:#1A1206;border-color:#3A3630;}body.dark .nav-item{color:#7A7570;}body.dark .nav-item i{color:#7A7570;}body.dark .nav-item.active{color:#E8E2D6;}body.dark .nav-item.active i{color:#E8E2D6;}body.dark .nav-add-btn{background:#E8E2D6;color:#130B00;}body.dark .nav-add-btn i{color:#130B00;}

body.dark .profile-wrap, body.dark .settings-wrap, body.dark .form-wrap, body.dark .detail-layout, body.dark .inbox-content, body.dark .notif-list, body.dark .container, body.dark .page, body.dark .catalog, body.dark .verify-hero, body.dark .progress-wrap { background: #130B00 !important; }
body.dark .card, body.dark [class*="-card"], body.dark [class*="item-card"], body.dark [class*="settings-item"], body.dark [class*="verify-card"], body.dark [class*="match-card"], body.dark [class*="profile-action"] { background: #1A1206 !important; border-color: #3A3630 !important; }
body.dark [class*="-card"] h3, body.dark [class*="-card"] .title, body.dark [class*="settings-item"] h3 { color: #E8E2D6 !important; }
body.dark [class*="-card"] p, body.dark [class*="-card"] span[class*="sub"], body.dark [class*="settings-item"] [class*="sub"] { color: #B0A9A0 !important; }

</style>

<body>
<div class="treqe-header">
    <div class="treqe-header__left">
      <button class="treqe-header__back" onclick="goToHome()" aria-label="Atras"><i class="fas fa-chevron-left"></i></button>
      <span class="treqe-header__title">Prototipo</span>
    </div>
    <div class="treqe-header__right">
    </div>
  </div>

<div class="phone">
    <!-- Navigation bar -->
    <div class="nav-bar">
      <span class="logo"><a href="../v16-portada/index.html" class="treqe-logo-link"><svg class="treqe-logo" viewBox="0 0 76 24" fill="none" xmlns="http://www.w3.org/2000/svg"><text x="0" y="19" font-family="Inter, sans-serif" font-weight="700" font-size="22" letter-spacing="-1.5" fill="#1C1915">treqe<text x="60" y="19" fill="#1C1915">.</text></text></svg></a></span>
      <select class="nav-select" id="screenSelect" onchange="goTo(this.value)">
        <option value="splash">🚀 Splash</option>
        <option value="onboarding">📱 Onboarding</option>
        <option value="registro">📝 Registro</option>
        <option value="catalogo" selected>🔍 Catálogo</option>
        <option value="detalle">📦 Detalle</option>
        <option value="subir">⬆️ Subir</option>
        <option value="perfil">👤 Perfil</option>
        <option value="notificaciones">🔔 Notificaciones</option>
        <option value="matches">⭐ Mis Matches</option>
        <option value="match">💱 Match</option>
        <option value="seguimiento">📍 Seguimiento</option>
        <option value="ajustes">⚙️ Ajustes</option>
      </select>
      <button class="nav-btn" onclick="navBack()" title="Volver"><i class="fas fa-arrow-left"></i></button>
      <button class="nav-btn primary" onclick="refreshFrame()" title="Recargar"><i class="fas fa-sync-alt"></i></button>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions" id="quickActions">
      <button onclick="goTo('catalogo')" class="active" id="btn-catalogo">Catálogo</button>
      <button onclick="goTo('perfil')" id="btn-perfil">Perfil</button>
      <button onclick="goTo('notificaciones')" id="btn-notificaciones">Notifs</button>
      <button onclick="goTo('matches')" id="btn-matches">Matches</button>
      <button onclick="goTo('subir')" id="btn-subir">Subir</button>
      <button onclick="goTo('match')" id="btn-match">Match</button>
    </div>

    <!-- Loading -->
    <div class="loader" id="loader"><div class="spinner"></div></div>

    <!-- Screen iframe -->
    <iframe id="screenFrame" src="../v1-catalogo/" onload="onFrameLoad()"></iframe>

    <!-- Info bar -->
    <div class="info-bar">
      <span><i class="fas fa-mouse-pointer"></i> Click en pantalla para interactuar</span>
      <span><i class="fas fa-code-branch"></i> v0-prototype</span>
    </div>
  </div>

  <script>
    var SCREENS = {
      'splash':         { path: '../v9-splash/',              name: 'Splash' },
      'onboarding':     { path: '../v5-onboarding/',          name: 'Onboarding' },
      'registro':       { path: '../v10-registro/',           name: 'Registro' },
      'catalogo':       { path: '../v1-catalogo/',            name: 'Catálogo' },
      'detalle':        { path: '../v2-detalle/',             name: 'Detalle' },
      'subir':          { path: '../v3-subir/',               name: 'Subir' },
      'perfil':         { path: '../v4-perfil/',              name: 'Perfil' },
      'notificaciones': { path: '../v11-notificaciones/',     name: 'Notificaciones' },
      'matches':        { path: '../v12-mis-matches/',        name: 'Mis Matches' },
      'match':          { path: '../v6-match-notification/',  name: 'Match' },
      'seguimiento':    { path: '../v7-seguimiento/',         name: 'Seguimiento' },
      'ajustes':        { path: '../v8-ajustes/',             name: 'Ajustes' },
    };

    var currentScreen = 'catalogo';
    var frame = document.getElementById('screenFrame');
    var loader = document.getElementById('loader');
    var navHistory = ['catalogo'];

    function goTo(screenId) {
      var screen = SCREENS[screenId];
      if (!screen) return;

      currentScreen = screenId;
      navHistory.push(screenId);

      // Update select
      document.getElementById('screenSelect').value = screenId;

      // Update quick actions
      document.querySelectorAll('.quick-actions button').forEach(btn => btn.classList.remove('active'));
      var activeBtn = document.getElementById('btn-' + screenId);
      if (activeBtn) activeBtn.classList.add('active');

      // Show loader and change src
      loader.classList.remove('hidden');
      frame.src = screen.path;
    }

    function onFrameLoad() {
      loader.classList.add('hidden');
    }

    function navBack() {
      if (navHistory.length > 1) {
        navHistory.pop();
        var prev = navHistory[navHistory.length - 1];
        goTo(prev);
        navHistory.pop(); // Prevent duplicate entry
      }
    }

    function refreshFrame() {
      loader.classList.remove('hidden');
      frame.src = frame.src;
    }

    window.goTo = goTo;
  
(function() {
  if (localStorage.getItem('treqe-darkmode') === 'true') {
    document.body.classList.add('dark');
  }
})();

</script>

</div>

  }
}
