name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/shared-types/**"
  workflow_dispatch: # Manual trigger

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build --filter=@treqe/web
        env:
          VITE_API_URL: https://treqe-production-8518.up.railway.app
          VITE_BASE: /treqe/
          DEPLOY_TARGET: github-pages

      - name: Generate 404.html for SPA routing
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Verify dist contents
        run: ls -la apps/web/dist/ && echo "---" && ls apps/web/dist/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
