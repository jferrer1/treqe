name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/algorithm-engine/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: railwayapp/railway-deploy@v1
        with:
          service: treqe-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
